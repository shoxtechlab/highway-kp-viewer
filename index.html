<!DOCTYPE html>
<html lang="ja">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高速道路KP Viewer</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header id="topbar">
        <a href="index.html" id="app-title">
            <span class="app-title-main">KP Viewer</span>
            <span class="app-title-sub">高速道路路線図</span>
        </a>
    </header>

    <main class="home">
        <section class="hero">

            <h2>路線一覧</h2>
            <div id="route-list" class="route-list"></div>
        </section>
    </main>

    <script src="./js/index.js" type="module"></script>

    </footer>
